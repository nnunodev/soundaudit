services:
  soundaudit:
    build: .
    container_name: soundaudit
    volumes:
      - /mnt/nas2/Music:/music:ro
      - ./data:/data
    environment:
      - SOUNDAUDIT_SCAN__PATHS=/music
      - SOUNDAUDIT_DATABASE__PATH=/data/scan.db
      - SOUNDAUDIT_SCAN__WORKERS=8
    working_dir: /workspace
    command: > 
      soundaudit scan /music --db /data/scan.db
