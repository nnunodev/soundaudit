# SoundAudit example configuration
# Place this in one of these locations:
#   - ./config.yaml  (current directory)
#   - Linux:   ~/.config/soundaudit/config.yaml
#   - macOS:   ~/Library/Application Support/soundaudit/config.yaml
#   - Windows: %APPDATA%\soundaudit\config.yaml

scan:
  paths:
    - ~/Music
  extensions:
    - .flac
    - .mp3
    - .m4a
    - .ogg
  workers: 4
  follow_symlinks: false
  hash_strategy: head-only

resolvers:
  rate_limit: 1.0  # seconds between requests
  retry_count: 3

fingerprinting:
  enabled: false
  fpcalc_path: /usr/bin/fpcalc
  api_key: "your-acoustid-key"
  cache_only: false

reporting:
  include_spectrograms: false
  min_similarity_for_duplicates: 0.95

actuator:
  dry_run: true
  backup_before_write: true
  rename_template: "{artist}/{album} [{year}]/{disc:02d}-{track:02d}. {title}.flac"
